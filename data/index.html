<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebControl</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 16px;
      text-align: center;
      background: #ffffff;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }
    .container {
      margin-top: 40px;
      text-align: center;
    }
    .status {
      margin-bottom: 20px;
      font-size: 18px;
    }
    .status span { font-weight: bold; }
    .on { color: #22c55e; }
    .off { color: #ef4444; }
    button {
      padding: 14px 24px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn-on { background: #16a34a; color: white; }
    .btn-off { background: #dc2626; color: white; }
  </style>
</head>
<body>

<header>WebControl</header>

<div class="container">
  <div class="status">
    Status do LED: <span id="status" class="off">Desligado</span>
  </div>

  <button class="btn-on" onclick="ligar()">Ligar</button>
  <button class="btn-off" onclick="desligar()">Desligar</button>
</div>

<script>
async function ligar() {
  await fetch('/on');
  atualizarStatus(true);
}

async function desligar() {
  await fetch('/off');
  atualizarStatus(false);
}

function atualizarStatus(isOn) {
  const el = document.getElementById('status');
  el.textContent = isOn ? 'Ligado' : 'Desligado';
  el.className = isOn ? 'on' : 'off';
}

async function obterStatus() {
  const res = await fetch('/status');
  const data = await res.text();
  atualizarStatus(data === 'ON');
}

obterStatus();
</script>

</body>
</html>
